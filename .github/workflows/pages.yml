name: Deploy Partner Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Copy site to build dir
        run: cp -r site _site

      - name: Install sharp (for PNG → WebP inlining)
        run: npm install --no-save sharp

      - name: Inline screenshots into HTML
        # StatiCrypt encrypts HTML only; linked images would be served publicly.
        # Inline them (as WebP data-URIs) into the HTML so they're encrypted too,
        # then drop the now-unreferenced images/ dir + internal files from _site.
        run: node scripts/inline-site-images.mjs _site

      - name: Encrypt HTML files with StatiCrypt
        # STATICRYPT_PASSWORD is read from env automatically by staticrypt v3.
        # We pass the secret via env: so it never appears on the command line.
        # --directory _site writes encrypted files back into _site (same as source
        # because we already copied to _site and the output dir matches input dir).
        # --recursive handles any html files nested in subdirectories.
        # --short: never prompt about password length — CI has no stdin, and a
        # prompt would otherwise be auto-declined and SKIP encryption (deploying
        # plaintext). Use a long passphrase for real security; --short only
        # suppresses the interactive guard.
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          npx staticrypt@3 _site/*.html \
            --directory _site \
            --recursive \
            --short \
            --config false
          # Fail loudly if encryption did not actually happen, so we never
          # deploy plaintext (belt-and-braces against a future silent skip).
          grep -q "staticryptEncryptedMsgUniqueVariableName\|staticrypt" _site/index.html \
            || { echo "::error::index.html is not encrypted — aborting deploy"; exit 1; }

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
