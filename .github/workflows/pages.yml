name: Deploy Partner Site to GitHub Pages

on:
  push:
    branches:
      - docs/partner-site
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Copy site to build dir
        run: cp -r site _site

      - name: Encrypt HTML files with StatiCrypt
        # STATICRYPT_PASSWORD is read from env automatically by staticrypt v3.
        # We pass the secret via env: so it never appears on the command line.
        # --directory _site writes encrypted files back into _site (same as source
        # because we already copied to _site and the output dir matches input dir).
        # --recursive handles any html files nested in subdirectories.
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          npx staticrypt@3 _site/*.html \
            --directory _site \
            --recursive \
            --config false

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
